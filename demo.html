<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Try tono right now — paste any draft and see how it rewrites in warmer, clearer, funnier, or safer tones." />
  <title>Try tono — live demo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

  <main>
    <div class="demo-shell">
      <h1 class="fade-up">try tono right now</h1>
      <p class="demo-subtitle fade-up delay-1">paste a draft, hit coach, see how tono rewrites it in any tone.</p>

      <div class="demo-box reveal">
        <textarea id="draft" class="demo-textarea" placeholder="Type a message you're about to send...&#10;&#10;e.g. 'I hate this meeting, what a waste of time'"></textarea>
        <button class="demo-btn" id="coachBtn" onclick="coach()">Coach my tone</button>

        <div class="demo-result" id="result">
          <div class="risk-badge" id="riskBadge"></div>
          <p class="perception" id="perception"></p>
          <div id="suggestions"></div>
        </div>

        <div class="demo-loading" id="loading" style="display:none">
          ✨ Coaching your tone...
        </div>
      </div>

      <p class="demo-cta">
        Love it? <a href="index.html#download">Get tono on your phone →</a>
      </p>
    </div>
  </main>

  <script>
    const API = 'https://tono-backend-production.up.railway.app';

    async function coach() {
      const draft = document.getElementById('draft').value.trim();
      if (!draft) return;

      document.getElementById('coachBtn').disabled = true;
      document.getElementById('result').classList.remove('show');
      document.getElementById('loading').style.display = 'block';

      try {
        const res = await fetch(`${API}/v1/analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ draft, mode: 'coach' })
        });

        const data = await res.json();

        document.getElementById('loading').style.display = 'none';

        if (data.risk_level) {
          const badge = document.getElementById('riskBadge');
          badge.textContent = data.risk_level.toUpperCase();
          badge.className = `risk-badge risk-${data.risk_level}`;

          document.getElementById('perception').textContent = data.perception;

          const sugDiv = document.getElementById('suggestions');
          sugDiv.innerHTML = '';
          (data.suggestions || []).forEach(s => {
            sugDiv.innerHTML += `
              <div class="suggestion">
                <div class="axis">${s.axis}</div>
                <div class="rewrite">${s.text}</div>
                <div class="rationale">${s.rationale}</div>
              </div>
            `;
          });

          document.getElementById('result').classList.add('show');
        }
      } catch (e) {
        document.getElementById('loading').innerHTML = '⚠️ Something went wrong. Try again.';
      }

      document.getElementById('coachBtn').disabled = false;
    }

    document.getElementById('draft').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.metaKey) coach();
    });
  </script>

  <script src="assets/nav-footer.js"></script>
</body>
</html>
