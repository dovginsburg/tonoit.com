<?xml version="1.0" encoding="UTF-8"?>
<!--
  tono — horizontal lockup  768×192
  Mark plate + lowercase wordmark + lowercase tagline.
  Brand voice: lowercase, periodless, dry. Tagline is the canonical hero sub: "pick one, copy, send."
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 192" role="img" aria-label="tono">
  <defs>
    <linearGradient id="tonoHL_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#D7B3FD"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#4E1A9E"/>
    </linearGradient>
  </defs>

  <!-- Mark plate -->
  <rect x="0" y="0" width="192" height="192" rx="36" fill="url(#tonoHL_bg)"/>
  <g fill="#FFFFFF" transform="scale(0.1875)">
    <rect x="466" y="216" width="92" height="592" rx="46"/>
    <rect x="304" y="216" width="416" height="92" rx="46"/>
    <path d="M558 672
             a128 128 0 0 1 -128 128
             v-92
             a36 36 0 0 0 36 -36
             z"/>
  </g>

  <!-- Wordmark — lowercase, Inter 700, optical kerning -->
  <text x="232" y="121"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="96" font-weight="700" fill="#FFFFFF"
        letter-spacing="-3.5">tono</text>
  <!-- Tagline (lowercase, periodless per voice rules) -->
  <text x="234" y="160"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="20" font-weight="500" fill="#D8B4FE"
        letter-spacing="-0.2">pick one. copy. send.</text>
</svg>
