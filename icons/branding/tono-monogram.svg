<?xml version="1.0" encoding="UTF-8"?>
<!--
  tono — monogram  256×256
  Lowercase "t" inside a violet plate. Used in browser tabs, app switcher icons,
  channel avatars where the full wordmark is illegible.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="tono">
  <defs>
    <linearGradient id="tonoMonoBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#D7B3FD"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#4E1A9E"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#tonoMonoBg)"/>
  <text x="128" y="186"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="172" font-weight="700"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="-6">t</text>
</svg>
